server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/xoxo_pos;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

app:
  jwt:
    secret: "xoxo-pos-utilidad-real-cambiar-en-produccion-12345678901234567890"
    expiration-minutes: 720
  cors:
    allowed-origin: "http://localhost:5173"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
